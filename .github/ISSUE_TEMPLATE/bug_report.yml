name: Bug Report
description: Report something that is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and fix the issue.

        **Do not include private user data, references, or vetting materials in this issue.** For security vulnerabilities, email jkservices091@gmail.com with subject `[Security]` instead of opening an issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps so a maintainer can reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened? Include error messages.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: Drag-and-drop images or paste a Loom link if helpful.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device, OS, browser, app version, Lovable preview vs. deployed, etc.
      placeholder: iPhone 15, iOS 18.2, Safari, Lovable preview
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am not including private user data, references, or vetting materials in this report.
          required: true
